kind = "mobile"
previewPath = "/"
title = "TradeMind AI"
version = "1.0.0"
id = "artifacts/trademind-ai"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 24696

[services.development]
run = "pnpm --filter @workspace/trademind-ai run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/trademind-ai", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/trademind-ai", "run", "serve" ]

[services.env]
PORT = "24696"
BASE_PATH = "/"
